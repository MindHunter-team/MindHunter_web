# Render Blueprint — single-click deploy for the review API
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: academic-review-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
